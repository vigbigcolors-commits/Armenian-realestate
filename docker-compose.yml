services:
  postgres:
    image: postgres:16-alpine
    container_name: smartestate_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smartestate}
      POSTGRES_USER: ${POSTGRES_USER:-smartestate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartestate}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smartestate_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  parser:
    profiles: ["scraper"]
    build:
      context: ./parser
      dockerfile: Dockerfile
    container_name: smartestate_parser
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./parser:/app
    command: python main.py

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: smartestate_api
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
      - api_uploads:/app/uploads

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: smartestate_bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./bot:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartestate_web
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - api
    environment:
      CHOKIDAR_USEPOLLING: "true"

volumes:
  postgres_data:
  frontend_node_modules:
  api_uploads:
